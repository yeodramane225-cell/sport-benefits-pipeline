services:
  kestra:
    image: kestra/kestra:latest-full
    container_name: kestra
    command: server standalone --config /app/config.yml
    ports:
      - "8080:8080"
    volumes:
      - ./kestra/config.yml:/app/config.yml
      - ./kestra/flows:/app/flows
      - ./kestra/storage:/app/storage
    depends_on:
      - postgres
      - minio

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
      POSTGRES_DB: sportdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  minio_data:

